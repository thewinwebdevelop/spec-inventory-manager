# Local dev runtime for OmniStock (F-000 · T-000-02).
# Spec: docs/features/F-000/infra.md §4. Not used in CI — CI (db-migrate job)
# uses its own ephemeral GitHub Actions service containers (infra.md §2.3).
#
# Usage: `pnpm db:up` / `pnpm db:down` (root package.json), or plain
# `docker compose up -d` / `docker compose down`.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: omnistock
      POSTGRES_PASSWORD: omnistock
      POSTGRES_DB: omnistock_dev
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omnistock -d omnistock_dev']
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports: ['6379:6379']
    volumes: ['redisdata:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
