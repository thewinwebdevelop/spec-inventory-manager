# F-000 T-000-10 · CI pipeline (infra.md §2). Five required jobs, each its own
# top-level job so one green job can never mask another red one (§2.1). Branch
# protection (§2.7) must add all five as required checks on `main` and disallow
# direct pushes — that part is a GitHub repo-admin setting, not in this file.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # AC2 (build covers all workspaces), lint (real TS lint), typecheck, test — Node only.
  node-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      # AC2: assert every workspace is in the build graph before building (no silent skip).
      - name: AC2 — build graph covers all workspaces
        # block scalar on purpose: the inline JS contains ": " which is illegal in a YAML plain scalar
        run: |
          pnpm exec turbo build --dry=json | node -e "const g=JSON.parse(require('fs').readFileSync(0));const names=new Set(g.tasks.map(t=>t.package));for(const p of ['@omnistock/core-domain','@omnistock/db','@omnistock/connectors','@omnistock/contracts','@omnistock/config','api','web','mobile','back-office']){if(!names.has(p)){console.error('::error::workspace missing from build graph: '+p);process.exit(1)}}console.log('all workspaces present')"
      - run: pnpm turbo lint typecheck test --filter='!./apps/mobile'

  # AC4/AC5/AC6/AC7/AC8 — one ephemeral Postgres, empty → migrated → introspected → trigger-armed (§3).
  db-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omnistock
          POSTGRES_PASSWORD: omnistock
          POSTGRES_DB: omnistock_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://omnistock:omnistock@localhost:5432/omnistock_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: generate Prisma client (gitignored — verify:ac imports it)
        run: pnpm --filter @omnistock/db exec prisma generate
      - name: AC4 — migrate deploy from empty
        run: pnpm --filter @omnistock/db exec prisma migrate deploy
      - name: AC4 — migrate status in sync (no drift)
        run: pnpm --filter @omnistock/db exec prisma migrate status
      # AC5/6/7 introspection + AC8 ledger-trigger negative test. qa-authored
      # (T-000-11), devops runs them here — MUST run after the FULL migration
      # chain (init + ledger trigger) on every CI run: a future Prisma migration
      # that recreates a ledger table silently drops the triggers and `migrate
      # status` won't catch it (T-000-05 security review, Important-2).
      - name: AC5/6/7/8 — schema shape + ledger immutability
        run: pnpm --filter @omnistock/db run verify:ac

  # AC9 — core-domain purity. Standalone from ESLint (§2.5). The gate script runs
  # BOTH the clean check (must pass) and the negative-fixture check (must fail),
  # so this single step proves the guard is live, not decorative.
  depcruise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@omnistock/core-domain # tsPreCompilationDeps needs built types
      - name: AC9 — core-domain purity gate (clean passes + fixture fails)
        run: pnpm depcruise

  # AC13 — Flutter analyze + test, own job/own required check. Mobile shell only;
  # the generated api_client package is excluded from analyze (analysis_options).
  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: apps/mobile/.flutter-version
      - name: build_runner — generate api_client .g.dart (built_value companions)
        working-directory: apps/mobile/api_client
        run: |
          dart pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: flutter pub get
        working-directory: apps/mobile
        run: flutter pub get
      - name: AC13 — flutter analyze
        working-directory: apps/mobile
        run: flutter analyze
      - name: AC13 — flutter test
        working-directory: apps/mobile
        run: flutter test

  # AC11 — committed generated clients must match a fresh regen; OpenAPI validates;
  # TS client typechecks in api+web. Needs Dart on PATH because gen:contracts:dart
  # runs build_runner (T-000-09 fix); flutter-action provides it.
  contracts-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: apps/mobile/.flutter-version
      - run: pnpm install --frozen-lockfile
      - name: regenerate Prisma client
        run: pnpm --filter @omnistock/db exec prisma generate
      - name: regenerate TS + Dart contracts clients
        run: pnpm turbo gen:contracts
      - name: fail on uncommitted diff (including untracked new generated files)
        run: |
          test -z "$(git status --porcelain -- packages/contracts/src/generated apps/mobile/api_client)" \
            || (git status --porcelain -- packages/contracts/src/generated apps/mobile/api_client; \
                echo "::error::generated client(s) are stale — run gen and commit" && exit 1)
      - name: AC11 — OpenAPI spec validation
        run: pnpm --filter @omnistock/contracts exec redocly lint openapi/openapi.yaml
      - name: AC11 — TS client typecheck-green (api + web)
        run: pnpm turbo typecheck --filter=api --filter=web

  # F-001 T-001-20 (I-1) — integration lane: boot a REAL apps/api process against
  # ephemeral Postgres+Redis service containers and prove it actually answers
  # over HTTP (not a build-only/unit-only proxy for "the server works").
  # Folds in the F-000 forward-commitment (AC3/AC15, forward-commitments.md
  # "→ F-001 (e2e-in-CI for AC3 / AC15)"): a supertest-equivalent HTTP hit
  # against a booted `/health`, now wired as a required, merge-blocking check
  # instead of local-only verification.
  # D-014: no `echo ok`/fake-pass steps. Once backend-api lands T-001-07's
  # supertest suite under the `test:integration` script convention, this job
  # picks it up automatically (no CI file change needed) — see the explicit
  # existence check below, which fails loudly rather than silently skipping
  # if the convention name is wrong, and prints a visible (not silent) notice
  # when the script genuinely doesn't exist yet.
  integration-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omnistock
          POSTGRES_PASSWORD: omnistock
          POSTGRES_DB: omnistock_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://omnistock:omnistock@localhost:5432/omnistock_ci
      REDIS_URL: redis://localhost:6379
      # CI-only placeholders — never real secrets (root CLAUDE.md constraint).
      # Satisfy packages/config's env schema (>=32 chars, must differ, F-001 I-4).
      JWT_ACCESS_SECRET: ci-access-secret-not-a-real-value-000000
      JWT_REFRESH_SECRET: ci-refresh-secret-not-a-real-value-00000
      PORT: "3000"
      NODE_ENV: test
      # T-001-12 — no proxy in front of the api in CI: trust zero XFF hops so
      # the IP-throttle tests (once T-001-07 lands) exercise the direct
      # socket-remote-address path, matching architecture.md §8.3's
      # "only known-proxy hops" rule (see infra/gateway/README.md).
      TRUST_PROXY_HOPS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: build workspace deps (api needs core-domain/db/contracts/config built)
        run: pnpm turbo build --filter=api^...
      - name: generate Prisma client
        run: pnpm --filter @omnistock/db exec prisma generate
      - name: migrate deploy (empty CI database)
        run: pnpm --filter @omnistock/db exec prisma migrate deploy
      - name: boot apps/api in the background
        run: pnpm --filter api run start &>/tmp/api.log &
        working-directory: .
      - name: wait for a REAL 200 from a booted /health (supertest-equivalent smoke, forward-commitment AC3/AC15)
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/health || true)
            if [ "$code" = "200" ]; then
              echo "GET /health -> 200 (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::apps/api never answered 200 on /health within 30s"
          cat /tmp/api.log || true
          exit 1
      - name: run api integration suite (T-001-07 supertest, once it lands)
        run: |
          if node -e "process.exit(require('./apps/api/package.json').scripts['test:integration'] ? 0 : 1)"; then
            pnpm --filter api run test:integration
          else
            echo "::notice::apps/api has no 'test:integration' script yet (F-001 T-001-07/T-001-18 not landed) — the required /health boot-smoke above still ran and gated this job; this step is a no-op until backend-api adds the script."
          fi
      - name: dump api log on failure
        if: failure()
        run: cat /tmp/api.log || true

  # F-001 T-001-20 (I-1) — web E2E lane: boot a REAL apps/web production server
  # and prove it actually answers over HTTP (forward-commitment: "web GET / 200").
  # Also runs apps/web's Playwright suite (T-001-18/qa) once it exists, via the
  # same existence-check convention as the api job above — no CI file change
  # needed when qa/frontend land `test:e2e`.
  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: build workspace deps (web needs contracts built)
        run: pnpm turbo build --filter=web^...
      - name: build apps/web (production)
        run: pnpm --filter web run build
      - name: boot apps/web in the background
        run: pnpm --filter web exec next start -p 3001 &>/tmp/web.log &
        working-directory: .
      - name: wait for a REAL 200 from a booted GET / (forward-commitment AC3)
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/ || true)
            if [ "$code" = "200" ]; then
              echo "GET / -> 200 (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::apps/web never answered 200 on / within 30s"
          cat /tmp/web.log || true
          exit 1
      - name: install Playwright browsers (only if apps/web declares test:e2e)
        run: |
          if node -e "process.exit(require('./apps/web/package.json').scripts['test:e2e'] ? 0 : 1)"; then
            pnpm --filter web exec playwright install --with-deps chromium
          else
            echo "::notice::apps/web has no 'test:e2e' script yet (F-001 T-001-15/16/18 not landed) — the required GET / boot-smoke above still ran and gated this job; this step is a no-op until frontend/qa add the script + Playwright config."
          fi
      - name: run web Playwright suite (T-001-18/qa, once it lands)
        run: |
          if node -e "process.exit(require('./apps/web/package.json').scripts['test:e2e'] ? 0 : 1)"; then
            pnpm --filter web run test:e2e
          else
            echo "::notice::skipped — see previous step"
          fi
      - name: dump web log on failure
        if: failure()
        run: cat /tmp/web.log || true
